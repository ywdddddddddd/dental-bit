<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>口腔健康解密卡 · AI预问诊</title>
  <style>
    :root {

      --green: #10b981;

      --shadow-card: 0 15px 30px rgba(0,0,0,0.45);

      --option-bg: rgba(255,255,255,0.05);
      --option-border: rgba(255,255,255,0.1);
      --option-active-bg: rgba(192,132,252,0.22);

      --btn-grad: linear-gradient(135deg, #8b5cf6, #ec4899);
      --theme-switcher-bg: rgba(255,255,255,0.06);
    }
    body.theme-purple { --body-bg: linear-gradient(155deg, #0f0c24 0%, #1a1540 40%, #1a1535 100%); --accent-purple: #a78bfa; --accent-pink: #f472b6; --accent-yellow: #facc15; --accent-orange: #f97316; --gradient-title: linear-gradient(135deg, #c3b5fd, #f9a8d4); --btn-grad: linear-gradient(135deg, #8b5cf6, #ec4899); }
    body.theme-ocean { --body-bg: linear-gradient(155deg, #0a1628 0%, #0d2137 40%, #0f2744 100%); --accent-purple: #67c3f3; --accent-pink: #38bdf8; --accent-yellow: #fde68a; --accent-orange: #fbbf24; --gradient-title: linear-gradient(135deg, #7dd3fc, #a5f3fc); --btn-grad: linear-gradient(135deg, #0369a1, #0284c7); }
    body.theme-emerald { --body-bg: linear-gradient(155deg, #0a1a13 0%, #0d2818 40%, #0f301c 100%); --accent-purple: #34d399; --accent-pink: #10b981; --accent-yellow: #fbbf24; --accent-orange: #f59e0b; --gradient-title: linear-gradient(135deg, #6ee7b7, #a7f3d0); --btn-grad: linear-gradient(135deg, #047857, #059669); }
    body.theme-sunset { --body-bg: linear-gradient(155deg, #1c0f0f 0%, #2a1a0f 40%, #351a15 100%); --accent-purple: #fbbf24; --accent-pink: #f59e0b; --accent-yellow: #facc15; --accent-orange: #ea580c; --gradient-title: linear-gradient(135deg, #fcd34d, #fdba74); --btn-grad: linear-gradient(135deg, #c2410c, #ea580c); }
    body.theme-light { --body-bg: linear-gradient(155deg, #e8e8ec 0%, #dde4f0 40%, #eef1f5 100%); --app-bg: rgba(255, 255, 255, 0.55); --bg-card: rgba(255, 255, 255, 0.7); --border-subtle: rgba(0, 0, 0, 0.08); --text-primary: #1e1b3a; --text-secondary: #5a5480; --option-bg: rgba(0,0,0,0.03); --option-border: rgba(0,0,0,0.08); --option-active-bg: rgba(139,92,246,0.12); --option-hover-bg: rgba(139,92,246,0.08); --accent-purple: #7c3aed; --accent-pink: #db2777; --accent-yellow: #ca8a04; --accent-orange: #ea580c; --gradient-title: linear-gradient(135deg, #7c3aed, #db2777); --btn-grad: linear-gradient(135deg, #7c3aed, #db2777); --theme-switcher-bg: rgba(0,0,0,0.04); --shadow-card: 0 10px 25px rgba(0,0,0,0.1); --green: #059669; --red: #dc2626; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
      background: var(--body-bg);
      background-attachment: fixed;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    .app-container {
      width: 100%;
      max-width: 480px;
      background: var(--app-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 36px;
      border: 1px solid var(--border-subtle);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(255, 255, 255, 0.06) inset;
      padding: 24px 18px 28px;
      color: var(--text-primary);
      max-height: 96vh;
      max-height: 96dvh;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .app-container::-webkit-scrollbar { width: 4px; }
    .app-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

    .screen { display: flex; flex-direction: column; gap: 18px; animation: fadeSlideIn 0.45s cubic-bezier(0.22, 0.61, 0.36, 1); }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.65; } }

    h1 { font-size: 1.9rem; font-weight: 700; background: var(--gradient-title); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }

    .theme-switcher { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; padding: 8px 0; }
    .theme-dot { width: 30px; height: 30px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
    .theme-dot:active { transform: scale(0.9); }
    .theme-dot.active { border-color: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.3); }
    .theme-dot.purple { background: linear-gradient(135deg, #8b5cf6, #ec4899); }
    .theme-dot.ocean { background: linear-gradient(135deg, #0369a1, #7dd3fc); }
    .theme-dot.emerald { background: linear-gradient(135deg, #047857, #6ee7b7); }
    .theme-dot.sunset { background: linear-gradient(135deg, #c2410c, #fcd34d); }
    .theme-dot.light { background: linear-gradient(135deg, #cbd5e1, #f1f5f9); border-color: #d1d5db !important; }
    body.theme-light .theme-dot.active { border-color: #6366f1; box-shadow: 0 0 10px rgba(99,102,241,0.4); }
    .tooth-icon { font-size: 3.2rem; text-align: center; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.5)); }

    .progress-section { display: flex; align-items: center; gap: 10px; }
    .progress-stage { font-size: 0.75rem; color: var(--text-secondary); min-width: 48px; font-weight: 500; }
    body.theme-light .progress-stage { color: #6b7280; }
    .progress-bar-bg { flex: 1; height: 7px; background: rgba(255,255,255,0.08); border-radius: 20px; overflow: hidden; }
    body.theme-light .progress-bar-bg { background: rgba(0,0,0,0.1); }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-purple), var(--accent-pink)); border-radius: 20px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 0 14px rgba(192,132,252,0.7); }

    .question-card { background: var(--bg-card); backdrop-filter: blur(12px); border-radius: var(--radius-lg); padding: 22px 16px; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-card); }
    .question-stage-tag { display: inline-block; font-size: 0.72rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; font-weight: 600; letter-spacing: 0.3px; }
    .tag-complaint { background: rgba(244,114,182,0.2); color: #f9a8d4; border: 1px solid rgba(244,114,182,0.3); }
    .tag-symptom { background: rgba(168,139,250,0.2); color: #c4b5fd; border: 1px solid rgba(168,139,250,0.3); }
    .tag-lifestyle { background: rgba(52,211,153,0.2); color: #6ee7b7; border: 1px solid rgba(52,211,153,0.3); }
    .tag-history { background: rgba(251,191,36,0.2); color: #fcd34d; border: 1px solid rgba(251,191,36,0.3); }

    .question-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 18px; line-height: 1.45; color: var(--text-primary); }
    body.theme-light .question-text { color: #1e1b3a; }
    .question-subtitle { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 14px; font-weight: 400; }

    .disease-desc { font-size: 0.9rem; line-height: 1.55; color: var(--text-secondary); }
    body.theme-light .disease-desc { color: #4a4468; }
    .disease-advice { margin-top: 12px; background: rgba(0,0,0,0.3); border-radius: var(--radius-sm); padding: 12px; font-size: 0.9rem; }
    body.theme-light .disease-advice { background: rgba(0,0,0,0.05); }
    .disease-advice strong { color: var(--accent-yellow); }

    .options-grid { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      background: var(--option-bg); border: 1px solid var(--option-border);
      border-radius: var(--radius-md); padding: 14px 16px; font-size: 0.92rem;
      font-weight: 500; color: var(--text-primary); text-align: left; display: flex;
      align-items: center; gap: 10px; transition: all 0.22s ease; cursor: pointer; line-height: 1.35;
      -webkit-tap-highlight-color: transparent;
    }
    .option-btn:active { background: var(--option-active-bg); border-color: var(--accent-purple); transform: scale(0.98); }
    .option-btn:hover { background: var(--option-hover-bg); border-color: rgba(192,132,252,0.5); transform: translateY(-1px); }
    .option-emoji { font-size: 1.5rem; min-width: 30px; text-align: center; flex-shrink: 0; }
    .option-text { flex: 1; min-width: 0; }
    .option-score-hint { font-size: 0.7rem; color: #8a84b8; opacity: 0; transition: opacity 0.2s; }
    .option-btn:active .option-score-hint { opacity: 1; }

    .option-btn.selected { background: var(--option-active-bg); border-color: var(--accent-purple); }
    .multi-select-hint { font-size: 0.72rem; color: var(--text-secondary); margin-bottom: 6px; text-align: center; }
    .btn-submit-multi { margin-top: 12px; width: 100%; }

    .result-header { text-align: center; }
    .result-header h2 { font-size: 1.4rem; font-weight: 700; color: #f0eef9; }

    .urgency-panel {
      text-align: center; padding: 14px 20px; border-radius: var(--radius-md);
      font-weight: 700; font-size: 0.88rem; margin-bottom: 6px; letter-spacing: 0.3px;
    }
    .urgency-green { background: rgba(16,185,129,0.12); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
    .urgency-yellow { background: rgba(245,158,11,0.12); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
    .urgency-red { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); animation: pulse 2s ease infinite; }

    .main-diagnosis {
      background: rgba(255,255,255,0.06); border-radius: var(--radius-lg); padding: 18px;
      border-left: 5px solid var(--accent-pink); margin: 4px 0;
    }
    .disease-name {
      font-size: 1.5rem; font-weight: 700;
      background: linear-gradient(to right, var(--accent-yellow), var(--accent-orange));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px;
    }
    .disease-desc { font-size: 0.9rem; line-height: 1.55; color: #cfc8ed; }
    .disease-advice { margin-top: 12px; background: rgba(0,0,0,0.3); border-radius: var(--radius-sm); padding: 12px; font-size: 0.9rem; }
    .disease-advice strong { color: var(--accent-yellow); }

    .section-title { font-weight: 700; font-size: 0.88rem; color: var(--text-secondary); margin: 4px 0; display: flex; align-items: center; gap: 6px; }
    body.theme-light .section-title { color: #5a5480; }

    .rank-list { display: flex; flex-direction: column; gap: 8px; }
    .rank-item {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(0,0,0,0.22); border-radius: var(--radius-sm); padding: 10px 12px;
      font-weight: 500; font-size: 0.85rem; gap: 8px; color: var(--text-primary);
    }
    body.theme-light .rank-item { background: rgba(0,0,0,0.05); }
    .rank-name { flex: 0 0 115px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.78rem; }
    .prob-bar-container { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 10px; margin: 0 8px; }
    body.theme-light .prob-bar-container { background: rgba(0,0,0,0.08); }
    .prob-bar-fill { height: 100%; background: linear-gradient(90deg, #a78bfa, #c4b5fd); border-radius: 10px; transition: width 0.6s ease; }
    .rank-pct { font-weight: 700; color: #c4b5fd; width: 36px; text-align: right; font-size: 0.82rem; flex-shrink: 0; }

    .category-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .cat-chip {
      background: rgba(255,255,255,0.05); border-radius: var(--radius-sm); padding: 10px 12px;
      text-align: center; font-size: 0.78rem; border: 1px solid rgba(255,255,255,0.06);
    }
    .cat-chip .cat-name { color: var(--text-secondary); margin-bottom: 3px; }
    .cat-chip .cat-pct { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); }

    .radar-chart { display: block; margin: 8px auto; max-width: 100%; width: 100%; }

    .btn {
      background: var(--btn-grad); border: none; border-radius: 40px;
      padding: 15px 20px; font-weight: 700; font-size: 1.05rem; color: white; cursor: pointer;
      box-shadow: 0 8px 22px rgba(168,85,247,0.4); transition: 0.2s; text-align: center;
      margin-top: 6px; -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); box-shadow: 0 4px 12px rgba(168,85,247,0.5); }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(236,72,153,0.55); }
    .btn-secondary {
      background: var(--theme-switcher-bg); border: 1px solid var(--border-subtle);
      box-shadow: none; color: var(--text-primary); font-size: 0.9rem; padding: 12px 18px;
    }

    .disclaimer { font-size: 0.7rem; color: var(--text-secondary); text-align: center; margin-top: 10px; opacity: 0.8; line-height: 1.5; }
    body.theme-light .disclaimer { color: #6b7280; }

    .share-row { display: flex; gap: 8px; margin-top: 4px; }
    .share-row .btn { flex: 1; }

    @media (max-width: 400px) {
      .app-container { border-radius: 28px; padding: 18px 14px 22px; }
      h1 { font-size: 1.6rem; }
      .question-text { font-size: 1.1rem; }
      .option-btn { padding: 12px 14px; font-size: 0.85rem; }
      .category-breakdown { grid-template-columns: 1fr 1fr; gap: 6px; }
      .cat-chip { padding: 8px 6px; font-size: 0.72rem; }
      .cat-chip .cat-pct { font-size: 0.95rem; }
    }
  </style>

<body>
  <div class="app-container" id="appContainer"></div>

  <script>
    (function() {
      // ==================== 主题系统 ====================
      const THEMES = ['purple', 'ocean', 'emerald', 'sunset', 'light'];
      const DEFAULT_THEME = 'purple';

      function applyTheme(name) {
        document.body.className = `theme-${name}`;
        try { localStorage.setItem('dental_sbti_theme', name); } catch(e) {}
        document.querySelectorAll('.theme-dot').forEach(d => d.classList.toggle('active', d.classList.contains(name)));
      }

      function initTheme() {
        let saved = DEFAULT_THEME;
        try { const s = localStorage.getItem('dental_sbti_theme'); if (s && THEMES.includes(s)) saved = s; } catch(e) {}
        applyTheme(saved);
      }

      function renderThemeDots() {
        const colors = [
          { name: 'purple', label: '夜空紫' },
          { name: 'ocean', label: '深海蓝' },
          { name: 'emerald', label: '翡翠绿' },
          { name: 'sunset', label: '日落橙' },
          { name: 'light', label: '极简白' }
        ];
        return `<div class="theme-switcher">${colors.map(c =>
          `<div class="theme-dot ${c.name}" data-theme="${c.name}" title="${c.label}"></div>`
        ).join('')}</div>`;
      }

      function bindThemeEvents() {
        document.querySelectorAll('.theme-dot').forEach(dot => {
          dot.addEventListener('click', () => {
            applyTheme(dot.dataset.theme);
          });
        });
      }

      initTheme();

      // ==================== 疾病库（46种，含关系元数据）====================
      const DISEASE_CATEGORIES = {
        tooth: { label: '牙体牙髓', color: '#f472b6' },
        perio: { label: '牙周', color: '#a78bfa' },
        mucosa: { label: '黏膜', color: '#34d399' },
        joint: { label: '颌面/关节/神经', color: '#fbbf24' },
        other: { label: '其他/系统', color: '#f97316' }
      };

      const DISEASES = {
        // ======== 牙体牙髓 ========
        caries_shallow: { name:'浅/中龋', cat:'tooth', urgency:'green', emoji:'🕳️', desc:'咬合面有黑线或小洞，吃甜食时微酸不适。', advice:'尽早补牙充填就好，现在处理花费最少、痛苦最小。', ageRange:[3,99], genderBias:null, causalParent:null, causalChildren:['caries_deep'], exclusiveGroup:'caries_spectrum' },
        caries_deep: { name:'深龋', cat:'tooth', urgency:'yellow', emoji:'🦷', desc:'冷热酸甜刺激时酸痛明显，刺激去掉后就没事了。', advice:'需要尽快补牙，可能要在洞底垫一层材料保护牙神经。', ageRange:[3,99], genderBias:null, causalParent:'caries_shallow', causalChildren:['irreversible_pulpitis'], exclusiveGroup:'caries_spectrum' },
        dentin_hypersensitivity: { name:'牙本质敏感', cat:'tooth', urgency:'green', emoji:'🧊', desc:'碰到冷热酸甜或刷牙时，牙齿短暂地尖锐刺痛一下。', advice:'用抗敏感牙膏，别横着用力拉锯式刷牙，换成巴氏刷牙法。', ageRange:[15,70], genderBias:null, causalParent:null, causalChildren:[], exclusiveGroup:'hypersensitivity_wedge' },
        wedge_defect: { name:'楔状缺损', cat:'tooth', urgency:'yellow', emoji:'🪥', desc:'牙齿和牙龈交界处有一条"V"型深沟，碰冷酸不适。', advice:'浅的用脱敏治疗，深的要树脂充填。最关键的是改掉横向拉锯式刷牙的习惯。', ageRange:[25,70], genderBias:null, causalParent:null, causalChildren:['dentin_hypersensitivity'], exclusiveGroup:'hypersensitivity_wedge' },
        cracked_tooth: { name:'牙隐裂', cat:'tooth', urgency:'yellow', emoji:'⚡', desc:'咬到特定硬物（比如花椒、骨头渣）时突发剧烈刺痛。', advice:'千万不要用这边咬硬东西了！可能需要做个全冠保护起来，严重的话要根管治疗。', ageRange:[30,70], genderBias:null, causalParent:null, causalChildren:['irreversible_pulpitis'], exclusiveGroup:'crack_trauma' },
        irreversible_pulpitis: { name:'急性牙髓炎', cat:'tooth', urgency:'red', emoji:'🔥', desc:'牙自己就疼起来了，晚上疼得更厉害，含冷水可能暂时舒服点。', advice:'赶紧去看牙医做根管治疗（俗称"抽神经"），止痛药只能临时顶一下。', ageRange:[6,99], genderBias:null, causalParent:'caries_deep', causalChildren:['apical_periodontitis','pulp_necrosis'], exclusiveGroup:'pulp_pathosis' },
        apical_periodontitis: { name:'根尖周炎', cat:'tooth', urgency:'yellow', emoji:'🎈', desc:'牙齿感觉"浮起来了"，比别的牙高一截，不敢咬东西，牙龈可能反复鼓脓包。', advice:'需要做彻底的根管治疗，严重的话可能还需要根尖手术。', ageRange:[6,99], genderBias:null, causalParent:'irreversible_pulpitis', causalChildren:['osteomyelitis_jaw'], exclusiveGroup:'pulp_pathosis' },

      // ==================== DAG 评分引擎 ====================
      class OralTriageEngine {
        constructor() {
          this.scores = {};
          this.rawScores = {};
          this.riskAccum = {};
          this.protectAccum = {};
          this.lockedDiseases = new Set();
          this.userAge = null;
          this.userGender = null;
          this.currentNode = 'q_entry';
          this.visitedNodes = [];
          this.universalQueue = [];
          this.hasRedFlag = false;
          this.totalNodesEstimate = 0;
          this.answeredCount = 0;
        }

        init() {
          this.scores = {};
          this.rawScores = {};
          this.riskAccum = {};
          this.protectAccum = {};
          this.lockedDiseases = new Set();
          this.currentNode = 'q_entry';
          this.visitedNodes = [];
          this.hasRedFlag = false;
          this.answeredCount = 0;
          this.universalQueue = Object.values(QUESTION_TREE).filter(q => q.universal).map(q => q.id);
          this.totalNodesEstimate = 5 + this.universalQueue.length;
          return QUESTION_TREE[this.currentNode];
        }

        getProgress() {
          const total = Math.max(1, this.totalNodesEstimate);
          return Math.min(95, Math.round((this.answeredCount / total) * 100));
        }

        answerBranch(branchIndex) {
          const node = QUESTION_TREE[this.currentNode];
          if (!node) return null;
          const branch = node.branches[branchIndex];
          if (!branch) return null;

          this.answeredCount++;
          this.visitedNodes.push(this.currentNode);

          if (branch.delta) {
            Object.entries(branch.delta).forEach(([diseaseId, value]) => {
              this.rawScores[diseaseId] = (this.rawScores[diseaseId] || 0) + value;
            });
          }
          if (branch.lock) {
            branch.lock.forEach(d => this.lockedDiseases.add(d));
          }
          if (branch.ageGate) this.userAge = branch.ageGate;
          if (branch.genderGate) this.userGender = branch.genderGate;
          if (branch.riskTag) {
            Object.entries(branch.riskTag).forEach(([diseaseId, multiplier]) => {
              this.riskAccum[diseaseId] = (this.riskAccum[diseaseId] || 1) * multiplier;
            });
          }
          if (branch.protect && branch.riskTag) {
            Object.entries(branch.riskTag).forEach(([diseaseId, multiplier]) => {
              this.protectAccum[diseaseId] = (this.protectAccum[diseaseId] || 1) * multiplier;
            });
          }
          if (branch.forceRed) this.hasRedFlag = true;

          let nextNodes = branch.next || [];
          if (nextNodes.length === 0 && this.universalQueue.length > 0) {
            nextNodes = [this.universalQueue.shift()];
          }
          this.totalNodesEstimate = this.answeredCount + nextNodes.length + this.universalQueue.length;

          if (nextNodes.length === 0) {
            this.currentNode = null;
            return this.finalize();
          }
          this.currentNode = nextNodes[0];
          return QUESTION_TREE[this.currentNode];
        }

        finalize() {
          const finalScores = {};
          Object.keys(this.rawScores).forEach(diseaseId => {
            if (this.lockedDiseases.has(diseaseId)) {
              finalScores[diseaseId] = 0;
              return;
            }
            let score = this.rawScores[diseaseId] || 0;
            if (this.riskAccum[diseaseId]) score *= this.riskAccum[diseaseId];
            if (this.protectAccum[diseaseId]) score *= this.protectAccum[diseaseId];

            const disease = DISEASES[diseaseId];
            if (disease && disease.ageRange && this.userAge) {
              const [minAge, maxAge] = disease.ageRange;
              const [userMin, userMax] = this.userAge;
              if (userMax < minAge || userMin > maxAge) score *= 0.3;
            }
            if (disease && disease.genderBias && this.userGender) {
              score *= (disease.genderBias === this.userGender) ? 1.3 : 0.6;
            }
            finalScores[diseaseId] = Math.round(score * 10) / 10;
          });

          DISEASE_GRAPH.mutualExclusionGroups.forEach(group => {
            let maxKey = null, maxScore = 0;
            group.forEach(key => { if (finalScores[key] > maxScore) { maxScore = finalScores[key]; maxKey = key; } });
            group.forEach(key => { if (key !== maxKey && finalScores[key] > 0) finalScores[key] *= 0.15; });
          });

          DISEASE_GRAPH.causalChains.forEach(chain => {
            for (let i = 0; i < chain.length - 1; i++) {
              const upstream = chain[i], downstream = chain[i + 1];
              if (finalScores[upstream] > 15) finalScores[downstream] = (finalScores[downstream] || 0) + finalScores[upstream] * 0.2;
            }
          });

          DISEASE_GRAPH.comorbidityPairs.forEach(([a, b]) => {
            if (finalScores[a] > 20 && finalScores[b] > 0) finalScores[b] *= 1.2;
            if (finalScores[b] > 20 && finalScores[a] > 0) finalScores[a] *= 1.2;
          });

          this.scores = finalScores;
          return this.ranking();
        }

        ranking(topN = 8) {
          const sorted = Object.entries(this.scores)
            .filter(([_, score]) => score > 0)
            .sort((a, b) => b[1] - a[1])
            .slice(0, topN);
          return sorted.map(([diseaseId, score]) => {
            const d = DISEASES[diseaseId];
            return { id: diseaseId, name: d?.name || diseaseId, score, urgency: d?.urgency || 'green', advice: d?.advice || '', desc: d?.desc || '', cat: d?.cat || 'other', emoji: d?.emoji || '🦷' };
          });
        }
      }

          const btn = document.createElement('div');
          btn.className = 'option-btn';
          btn.innerHTML = `<span class="option-emoji">${branch.emoji}</span><span class="option-text">${branch.text}</span>`;

          if (isMulti) {
            btn.addEventListener('click', () => {
              const existIdx = selectedBranches.findIndex(b => b.idx === idx);
              if (existIdx >= 0) {
                selectedBranches.splice(existIdx, 1);
                btn.classList.remove('selected');
              } else {
                selectedBranches.push({ idx, branch });
                btn.classList.add('selected');
              }
            });
          } else {
            btn.addEventListener('click', () => {
              userAnswers.push({ qid: qData.id, text: branch.text });
              if (branch.advice) branchAdvice = branch.advice;
              const result = engine.answerBranch(idx);

              if (branch.forceRed && branch.advice) {
                showEmergencyAlert(branch.advice, () => proceedResult(result));
              } else if (result && Array.isArray(result)) {
                showResult(result);
              } else if (result && result.id) {
                renderQuestion(result, engine.getProgress());
              } else {
                showResult([]);
              }

          optionsContainer.appendChild(btn);

        if (isMulti) {
          document.getElementById('multiSubmitBtn').addEventListener('click', () => {
            if (selectedBranches.length === 0) {

              userAnswers.push({ qid: qData.id, text: branch.text });

          if (result && Array.isArray(result)) showResult(result);
          else if (result && result.id) renderQuestion(result, engine.getProgress());

        }

      function getCategoryScores(scores) {
        const catScores = {};
        Object.entries(DISEASE_CATEGORIES).forEach(([catKey, cat]) => {
          let total = 0;
          Object.entries(scores).forEach(([diseaseId, score]) => {
            const d = DISEASES[diseaseId];
            if (d && d.cat === catKey) total += score;
          });
          catScores[catKey] = total;
        });
        return catScores;
      }

      function renderRadarChart(catScores) {
        const cats = Object.entries(DISEASE_CATEGORIES);
        const labels = cats.map(([_, c]) => c.label);
        const rawValues = cats.map(([key]) => catScores[key] || 0);
        const maxVal = Math.max(1, ...rawValues);
        const values = rawValues.map(v => Math.max(v / maxVal, 0.02));
        const size = 340, cx = size / 2, cy = size / 2, r = 85;
        const angleStep = (2 * Math.PI) / labels.length;
        const startAngle = -Math.PI / 2;

        let points = [], polygonPoints = [];
        for (let i = 0; i < labels.length; i++) {
          const angle = startAngle + i * angleStep;
          const v = values[i];
          const px = cx + r * v * Math.cos(angle);
          const py = cy + r * v * Math.sin(angle);
          points.push({ angle, x: px, y: py, val: v });
          polygonPoints.push(`${px.toFixed(1)},${py.toFixed(1)}`);
        }

        let svg = `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" class="radar-chart">`;
        svg += `<defs><clipPath id="rcCrop"><rect x="0" y="0" width="${size}" height="${size}"/></clipPath></defs>`;
        svg += `<g clip-path="url(#rcCrop)">`;
        for (let level = 1; level <= 4; level++) {
          const gridR = r * (level / 4);
          let gridPts = [];
          for (let i = 0; i < labels.length; i++) {
            const angle = startAngle + i * angleStep;
            gridPts.push(`${(cx + gridR * Math.cos(angle)).toFixed(1)},${(cy + gridR * Math.sin(angle)).toFixed(1)}`);
          }
          svg += `<polygon points="${gridPts.join(' ')}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>`;
        }
        for (let i = 0; i < labels.length; i++) {
          const angle = startAngle + i * angleStep;
          svg += `<line x1="${cx}" y1="${cy}" x2="${(cx + r * Math.cos(angle)).toFixed(1)}" y2="${(cy + r * Math.sin(angle)).toFixed(1)}" stroke="rgba(255,255,255,0.06)" stroke-width="0.6"/>`;
        }
        svg += `<polygon points="${polygonPoints.join(' ')}" fill="rgba(168,139,250,0.2)" stroke="#a78bfa" stroke-width="1.8" stroke-linejoin="round"/>`;
        for (const p of points) {
          svg += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="#c4b5fd" stroke="#fff" stroke-width="0.8"/>`;
        }
        const labelDist = r + 36;
        for (let i = 0; i < labels.length; i++) {
          const angle = startAngle + i * angleStep;
          const cos = Math.cos(angle), sin = Math.sin(angle);
          let lx = cx + labelDist * cos, ly = cy + labelDist * sin;
          const labelText = labels[i];
          const parts = labelText.split('/');
          const shortLabel = parts[0];
          const hasSub = parts.length > 1;
          let txtAnchor;
          if (i === 0) txtAnchor = 'middle';
          else if (i === labels.length - 1) txtAnchor = 'middle';
          else txtAnchor = lx < cx - 5 ? 'end' : lx > cx + 5 ? 'start' : 'middle';
          const margin = 18;
          lx = Math.max(margin, Math.min(size - margin, lx));
          ly = Math.max(margin, Math.min(size - margin, ly));
          if (hasSub) {
            svg += `<text x="${lx.toFixed(1)}" y="${(ly - 6).toFixed(1)}" text-anchor="${txtAnchor}" dominant-baseline="auto" fill="#b9b1dc" font-size="12" font-weight="600">${shortLabel}</text>`;
            svg += `<text x="${lx.toFixed(1)}" y="${(ly + 10).toFixed(1)}" text-anchor="${txtAnchor}" dominant-baseline="auto" fill="#8a84b8" font-size="9" font-weight="400">${parts.slice(1).join('/')}</text>`;
          } else {
            svg += `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="${txtAnchor}" dominant-baseline="middle" fill="#b9b1dc" font-size="12" font-weight="600">${labelText}</text>`;
          }
        }
        svg += '</g></svg>';
        return svg;
      }

      function showResult(rankings) {
        if (!rankings || rankings.length === 0) {
          renderHealthy();
          return;
        }

        const totalScore = rankings.reduce((s, r) => s + r.score, 0);
        const results = rankings.map(r => ({ ...r, prob: Math.round((r.score / totalScore) * 100) }));
        const primary = results[0];
        const secondary = results.slice(1, 6).filter(r => r.prob >= 5);
        const diffDiag = results.slice(1, 4).filter(r => r.prob >= 3);

        let finalUrgency = primary.urgency;
        if (engine.hasRedFlag && finalUrgency !== 'red') finalUrgency = 'red';

        const urgencyLabel = {
          green: '🟢 居家观察 · 择期就诊',
          yellow: '🟡 存在隐患 · 建议尽快就诊',
          red: '🔴 紧急！请立即就医'
        };

        const catScores = getCategoryScores(engine.scores);
        const catEntries = Object.entries(DISEASE_CATEGORIES).map(([key, c]) => ({
          key, label: c.label, color: c.color, score: catScores[key] || 0
        }));
        const catMax = Math.max(1, ...catEntries.map(c => c.score));
        const referral = getReferralInfo(primary.cat);

        const container = document.getElementById('appContainer');
        container.innerHTML = `
          <div class="screen" id="resultScreen">
            <div class="tooth-icon">${primary.emoji}</div>
            <div class="result-header"><h2>你的口腔成分报告</h2></div>
            <div class="urgency-panel urgency-${finalUrgency}">${urgencyLabel[finalUrgency]}</div>
            <div class="main-diagnosis">
              <div style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:4px;">📌 主要风险指向 (${primary.prob}%)</div>
              <div class="disease-name">${primary.name}</div>
              <div class="disease-desc">${primary.desc}</div>
              <div class="disease-advice">
                <strong>💡 建议方案：</strong><br/>
                <span style="color:#e2dcf4;display:inline-block;margin-top:6px;">${primary.advice}</span>
              </div>
            </div>

            ${diffDiag.length > 0 ? `
            <div>
              <div class="section-title">🔬 鉴别诊断参考</div>
              <div class="rank-list">
                ${diffDiag.map(r => `
                  <div class="rank-item">
                    <span class="rank-name">${r.emoji} ${r.name}</span>
                    <div class="prob-bar-container">
                      <div class="prob-bar-fill" style="width:${r.prob}%;opacity:${0.25+r.prob/150};background:linear-gradient(90deg,#fbbf24,#f59e0b)"></div>
                    </div>
                    <span class="rank-pct" style="color:#fbbf24">${r.prob}%</span>
                  </div>
                `).join('')}
              </div>
            </div>` : ''}

            <div style="background:rgba(255,255,255,0.04);border-radius:var(--radius-sm);padding:12px;margin-top:4px;">
              <div class="section-title">🏥 就诊建议</div>
              <div style="font-size:0.82rem;line-height:1.7;color:var(--text-secondary);">
                <div><strong style="color:var(--accent-purple)">建议挂号科室：</strong>${referral.dept}</div>
                <div><strong style="color:var(--accent-purple)">可能需要的检查：</strong>${referral.exam}</div>
              </div>
            </div>

            <div>
              <div class="section-title">🎯 疾病维度雷达图</div>
              ${renderRadarChart(catScores)}
            </div>

            <div>
              <div class="section-title">📊 疾病分类占比</div>
              <div class="category-breakdown">
                ${catEntries.map(c => {
                  const pct = c.score > 0 ? Math.round((c.score / catMax) * 100) : 0;
                  return `<div class="cat-chip"><div class="cat-name" style="color:${c.color}">${c.label}</div><div class="cat-pct" style="color:${c.color}">${pct}%</div></div>`;
                }).join('')}
              </div>
            </div>

            ${secondary.length > 0 ? `
            <div>
              <div class="section-title">🔍 其他需关注的风险</div>
              <div class="rank-list">
                ${secondary.map(r => `
                  <div class="rank-item">
                    <span class="rank-name">${r.emoji} ${r.name}</span>
                    <div class="prob-bar-container">
                      <div class="prob-bar-fill" style="width:${r.prob}%;opacity:${0.3+r.prob/180}"></div>
                    </div>
                    <span class="rank-pct">${r.prob}%</span>
                  </div>
                `).join('')}
              </div>
            </div>` : ''}

            <div class="share-row">
              <button class="btn" id="restartBtn" style="flex:1;">🔄 重新测试</button>
              <button class="btn btn-secondary" id="shareBtn" style="flex:0 0 auto;padding:15px 18px;">📋 复制结果</button>
            </div>
            <div class="disclaimer">
              ⚠️ 医疗免责声明：本问卷基于疾病因果关系网络（DAG）分析症状倾向，仅作科普参考，不具有临床诊断效力。请以专业医师的面诊及影像学检查结果为准。如有紧急症状请立即就医。
            </div>
          </div>
        `;

        document.getElementById('restartBtn').addEventListener('click', renderWelcome);
        document.getElementById('shareBtn').addEventListener('click', () => {
          const text = `🦷 口腔健康解密卡报告\n📌 主要风险：${primary.name} (${primary.prob}%)\n${urgencyLabel[finalUrgency]}\n💡 ${primary.advice}\n🏥 建议科室：${referral.dept}\n\n⚕️ 本报告仅为AI参考，请咨询专业牙医。`;
          if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(() => {
              const btn = document.getElementById('shareBtn');
              btn.textContent = '✅ 已复制';
              setTimeout(() => { btn.textContent = '📋 复制结果'; }, 2000);
            });
          }
        });
      }

      function renderHealthy() {
        const container = document.getElementById('appContainer');
        container.innerHTML = `
          <div class="screen" id="resultScreen">
            <div class="tooth-icon">✨🦷✨</div>
            <div class="result-header"><h2>口腔状态极佳！</h2></div>
            <div class="urgency-panel urgency-green">🟢 健康达人 · 继续保持</div>
            <div class="main-diagnosis" style="border-left-color:#34d399;">
              <div class="disease-name" style="background:linear-gradient(to right,#34d399,#10b981);-webkit-background-clip:text;">口腔健康达人</div>
              <div class="disease-desc">根据你的回答，目前没有发现明显的口腔疾病风险。你的清洁习惯、生活作息和饮食都很棒！</div>
              <div class="disease-advice">
                <strong>💡 牙医的建议：</strong><br/>
                <span style="color:#e2dcf4;display:inline-block;margin-top:6px;">建议每半年到一年洗牙检查一次，防患于未然。小小的好习惯可以带来大大的口腔健康！</span>
              </div>
            </div>
            <button class="btn" id="restartBtn">🔄 重新测试</button>
            <div class="disclaimer">* 本结果仅供参考，定期牙科检查不可替代。</div>
          </div>
        `;
        document.getElementById('restartBtn').addEventListener('click', renderWelcome);
      }

      renderWelcome();
    })();
  </script>
</body>
</html>
